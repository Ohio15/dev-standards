name: healthcheck-shape-lint

# Standalone CI gate for IMPL-9. Mirrors the pre-commit hook
# (.githooks/pre-commit-healthcheck-lint.sh) at PR-time so the rule is
# enforced even when a developer commits with --no-verify.
#
# Kept separate from release-gates.yml on purpose — release-gates.yml is
# under concurrent edit by sibling work for IMPL-5 + IMPL-7. When the dust
# settles, this file's logic can be rolled into release-gates.yml as a
# sub-job, and this workflow can be deleted.
#
# Trigger: any PR or push that touches a release-config.y?ml file.
# Scope: validates only changed release-config.y?ml files in the PR diff
# (push events validate the full set, since "diff" isn't well-defined for
# arbitrary pushes).

on:
  pull_request:
    paths:
      - '**/release-config.yml'
      - '**/release-config.yaml'
      - 'release-config.yml'
      - 'release-config.yaml'
  push:
    branches: [main, master]
    paths:
      - '**/release-config.yml'
      - '**/release-config.yaml'
      - 'release-config.yml'
      - 'release-config.yaml'

permissions:
  contents: read

jobs:
  healthcheck-shape-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history for `git diff` against the base ref on PRs.
          fetch-depth: 0

      - name: Resolve files to lint
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR "$base" "$head" \
              | grep -E '(^|/)release-config\.ya?ml$' > files.txt || true
          else
            # Push: lint everything currently in the tree matching the pattern.
            git ls-files \
              | grep -E '(^|/)release-config\.ya?ml$' > files.txt || true
          fi
          if [ ! -s files.txt ]; then
            echo "no release-config.y?ml files in scope"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            echo "count=$(wc -l < files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
            echo "files in scope:"; cat files.txt
          fi

      - name: Install yq
        if: steps.files.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          # mikefarah/yq v4 — Go binary, single file, no deps. Pinned by version
          # rather than SHA because v4.x has been API-stable since 2021.
          sudo wget -q -O /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Lint health_check.command shape
        if: steps.files.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          violations_found=0

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue

            cmd="$(yq -r '.docker.deploy.health_check.command // "__ABSENT__"' "$f" 2>/dev/null || echo "__ABSENT__")"

            # Pass: key absent (lib/electron/mcp surfaces).
            if [ "$cmd" = "__ABSENT__" ]; then
              echo "ok  $f  (no docker.deploy.health_check.command — surface not docker)"
              continue
            fi

            # Locate line for error output.
            hc_line="$(grep -n -E '^[[:space:]]*health_check:[[:space:]]*$' "$f" | head -n1 | cut -d: -f1 || true)"
            cmd_line=""
            if [ -n "$hc_line" ]; then
              cmd_line="$(awk -v start="$hc_line" 'NR>start && NR<=start+20 && /^[[:space:]]*command:/ {print NR; exit}' "$f" || true)"
            fi
            line="${cmd_line:-${hc_line:-1}}"

            # R1: multi-line block scalar.
            if [ "$(printf '%s' "$cmd" | wc -l | tr -d ' ')" -gt 0 ]; then
              first_line="$(printf '%s' "$cmd" | head -n1)"
              echo "::error file=$f,line=$line::[R1] multi-line block scalar (first line: $first_line). STANDARDS section 7 #1: single request, no shell loop."
              violations_found=1
              continue
            fi

            trimmed="${cmd#"${cmd%%[![:space:]]*}"}"

            # Pass: comment-only line (intentional disable).
            if [[ "$trimmed" =~ ^# ]]; then
              echo "ok  $f  (comment-only command — treated as disabled)"
              continue
            fi

            # R2: shell-loop keywords.
            bad_kw=""
            for kw in 'for ' 'while ' 'until ' 'seq ' 'do '; do
              case " $trimmed " in
                *" $kw"*) bad_kw="$kw" ; break ;;
              esac
            done
            if [ -z "$bad_kw" ]; then
              case "$trimmed" in
                *';done'*|*'; done'*|*' done') bad_kw="done" ;;
              esac
            fi

            if [ -n "$bad_kw" ]; then
              echo "::error file=$f,line=$line::[R2] shell-loop keyword '${bad_kw% }' present. STANDARDS section 7 #1: single request, no shell loop. Fix template: command: curl -fsS -m 5 http://localhost:<port>/<path>"
              violations_found=1
              continue
            fi

            # R3: single-shot prefix.
            ok=0
            case "$trimmed" in
              curl\ *|wget\ *) ok=1 ;;
              'bash -c "curl '*|"bash -c 'curl "*) ok=1 ;;
              'sh -c "curl '*|"sh -c 'curl "*) ok=1 ;;
              'bash -c "wget '*|"bash -c 'wget "*) ok=1 ;;
              'sh -c "wget '*|"sh -c 'wget "*) ok=1 ;;
            esac
            if [ "$ok" -ne 1 ]; then
              echo "::error file=$f,line=$line::[R3] command must start with curl/wget (single-shot). Got: $trimmed. Fix template: command: curl -fsS -m 5 http://localhost:<port>/<path>"
              violations_found=1
              continue
            fi

            echo "ok  $f  (single-shot $trimmed)"
          done < files.txt

          if [ "$violations_found" -ne 0 ]; then
            echo
            echo "::error::healthcheck-shape-lint failed. See STANDARDS.md section 7."
            exit 1
          fi
