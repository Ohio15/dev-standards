name: Size Guard
on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  size-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject tracked files larger than 10 MB
        shell: bash
        run: |
          set -euo pipefail
          MAX=$((10 * 1024 * 1024))
          violations=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            allow=0
            if [ -f ".large-files-allowlist" ]; then
              while IFS= read -r pat; do
                [[ "$pat" =~ ^[[:space:]]*# || -z "$pat" ]] && continue
                if [[ "$f" == $pat || "$f" == ${pat%/}/* ]]; then allow=1; break; fi
              done <".large-files-allowlist"
            fi
            [ "$allow" -eq 1 ] && continue
            sz=$(git cat-file -s "HEAD:$f" 2>/dev/null || echo 0)
            if [ "$sz" -gt "$MAX" ]; then
              hr=$(awk -v b="$sz" 'BEGIN{s="BKMGT";v=b;i=1;while(v>=1024&&i<length(s)){v/=1024;i++}printf "%.1f%s",v,substr(s,i,1)}')
              violations="${violations}  ${f} (${hr})\n"
            fi
          done < <(git ls-files)

          if [ -n "$violations" ]; then
            {
              echo "::error::Tracked files exceed 10 MB size guard:"
              printf "%b" "$violations"
              echo
              echo "Binaries belong in GitHub Releases, not git."
              echo "Legitimate exceptions go in .large-files-allowlist with a # reason: comment."
            } >&2
            exit 1
          fi
