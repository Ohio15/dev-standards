name: docker-release

# Reusable workflow for container services deployed to NEXUS.
# On `push: tags: ['v*']` from a consumer repo:
#   1. Run release-gates (tests, gitleaks, size-guard, npm-audit, tag-matches-version).
#   2. Build the Docker image on a cloud runner; push to ghcr.io/<owner>/<repo>:<tag> + :latest.
#   3. On the self-hosted nexus-deploy runner: record current image digests for rollback,
#      update IMAGE_TAG env, `docker compose up -d`, run health check, rollback on fail.
#   4. Publish ntfy notification (success/failure).
#
# Schema: see release/SPEC.md in dev-standards.
#
# Per-repo prereqs:
#   - Self-hosted runner labeled `nexus-deploy` registered against the consumer repo.
#     User-owned accounts cannot share runners across repos; each consumer registers
#     its own runner pointing at the same NEXUS host.
#   - Compose file uses `image: ghcr.io/${{owner}}/${{repo}}-<svc>:${IMAGE_TAG:-latest}`
#     so the deploy can swap tags atomically and roll back.
#
# ─── Build-arg substitution ──────────────────────────────────────────────────
# Each `docker.images[*].build_args` map in release-config.yml is passed to
# `docker/build-push-action`. Values support two placeholder forms that are
# expanded at runtime BEFORE the image is built:
#
#   ${vars.NAME}      → resolved from GitHub Actions repo/org Variables.
#                       Workflow reads `toJson(vars)` once at build time and
#                       substitutes by key. Missing variables fail the build.
#
#   ${secrets.NAME}   → resolved from a secrets JSON the CALLER must supply
#                       via the `build_secrets_json` workflow input
#                       (e.g. `build_secrets_json: ${{ toJson(secrets) }}`).
#                       Reusable workflows cannot enumerate inherited secrets,
#                       so opt-in is required. Each substitution emits a
#                       ::warning:: in the build log because the resulting
#                       image bakes the secret in plaintext layers — anyone
#                       who pulls can extract it. Use sparingly (private
#                       package registry tokens are the typical legitimate
#                       case; consider multi-stage builds + BuildKit secrets
#                       mounts instead when possible).
#
# Note: the placeholder syntax is intentionally `${name.X}`, NOT `${{ name.X }}`,
# so the YAML expression engine ignores it at workflow-eval time and the
# substitution happens in bash at build time after yq has read the config.
#
# Plain literal values (no placeholder) pass straight through. `build_args` is
# optional; consumers without bake-time config can omit it entirely.
#
# Example release-config.yml:
#
#   docker:
#     images:
#       - name: ghcr.io/ohio15/sentinel-frontend
#         dockerfile: frontend/Dockerfile
#         context: ./frontend
#         build_args:
#           VITE_API_URL: https://${vars.DOMAIN}/api
#           VITE_WS_URL: wss://${vars.DOMAIN}/ws
#           BUILD_REVISION: ${vars.GIT_SHA_SHORT}
#           NPM_TOKEN: ${secrets.NPM_READ_TOKEN}   # warns: bakes into image
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      ntfy_topic:
        type: string
        default: nexus-alerts
        description: ntfy topic to publish release events to.
      ntfy_host:
        type: string
        default: http://192.168.1.20:2586
        description: ntfy base URL reachable from the self-hosted runner.
      build_secrets_json:
        type: string
        default: '{}'
        description: |
          JSON object of secrets accessible to build_args dollar-secrets placeholders.
          Reusable workflows cannot enumerate inherited secrets, so the caller
          must opt in by passing the toJson(secrets) expression (or a curated subset).
          Default empty-object means no dollar-secrets placeholders are resolvable;
          any such reference in build_args will fail the build with a clear error.
          See header comment for placeholder syntax.

permissions:
  contents: read
  packages: write

jobs:
  gates:
    uses: Ohio15/dev-standards/.github/workflows/release-gates.yml@v1

  read-docker-config:
    needs: gates
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.parse.outputs.project }}
      images: ${{ steps.parse.outputs.images }}
      nexus_path: ${{ steps.parse.outputs.nexus_path }}
      compose_file: ${{ steps.parse.outputs.compose_file }}
      services: ${{ steps.parse.outputs.services }}
      health_check_command: ${{ steps.parse.outputs.health_check_command }}
      health_check_timeout: ${{ steps.parse.outputs.health_check_timeout }}
      health_check_interval: ${{ steps.parse.outputs.health_check_interval }}
      rollback_on_health_fail: ${{ steps.parse.outputs.rollback_on_health_fail }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        shell: bash
        run: |
          set -euo pipefail
          read_with_default() {
            local path="$1" default="$2" val
            val=$(yq "$path" release-config.yml)
            if [ "$val" = "null" ] || [ -z "$val" ]; then echo "$default"; else echo "$val"; fi
          }
          project=$(read_with_default '.project' 'unknown')

          # docker.images is required; must be a non-empty array.
          images_count=$(yq '.docker.images | length' release-config.yml)
          if [ "$images_count" = "null" ] || [ "$images_count" -lt 1 ]; then
            echo "::error::release-config.yml missing required field: docker.images (non-empty array)"
            exit 1
          fi
          images=$(yq -o=json '.docker.images' release-config.yml | jq -c)

          nexus_path=$(read_with_default '.docker.deploy.nexus_path' '')
          compose_file=$(read_with_default '.docker.deploy.compose_file' 'docker-compose.yml')
          services=$(yq -o=json '.docker.deploy.services // []' release-config.yml | jq -c)
          # Health-check command is potentially multiline (yaml `|` block).
          # GITHUB_OUTPUT requires single-line key=value, so base64-encode for
          # transport; the deploy job decodes before exec. Empty -> empty.
          raw_health_cmd=$(yq '.docker.deploy.health_check.command' release-config.yml)
          if [ "$raw_health_cmd" = "null" ] || [ -z "$raw_health_cmd" ]; then
            health_check_command=""
          else
            health_check_command=$(printf '%s' "$raw_health_cmd" | base64 -w0)
          fi
          health_check_timeout=$(read_with_default '.docker.deploy.health_check.timeout_seconds' '60')
          health_check_interval=$(read_with_default '.docker.deploy.health_check.interval_seconds' '5')
          rollback_on_health_fail=$(read_with_default '.docker.deploy.rollback_on_health_fail' 'true')
          {
            echo "project=$project"
            echo "images=$images"
            echo "nexus_path=$nexus_path"
            echo "compose_file=$compose_file"
            echo "services=$services"
            echo "health_check_command=$health_check_command"
            echo "health_check_timeout=$health_check_timeout"
            echo "health_check_interval=$health_check_interval"
            echo "rollback_on_health_fail=$rollback_on_health_fail"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: [gates, read-docker-config]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image: ${{ fromJson(needs.read-docker-config.outputs.images) }}
    outputs:
      version: ${{ needs.gates.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build args (substitute ${vars.X} / ${secrets.X})
        id: buildargs
        shell: bash
        env:
          # toJson(vars) is always available in reusable workflows.
          VARS_JSON: ${{ toJson(vars) }}
          # Caller-supplied; default '{}' means no ${secrets.X} placeholders allowed.
          SECRETS_JSON: ${{ inputs.build_secrets_json }}
          # Matrix value is a JSON object (or null/empty when build_args omitted).
          BUILD_ARGS_JSON: ${{ toJson(matrix.image.build_args) }}
        run: |
          set -euo pipefail

          # Empty / null / missing build_args -> emit empty output, done.
          if [ -z "${BUILD_ARGS_JSON}" ] \
             || [ "${BUILD_ARGS_JSON}" = "null" ] \
             || [ "${BUILD_ARGS_JSON}" = "{}" ]; then
            echo "no build_args for this image"
            # Multiline-safe empty output via heredoc.
            {
              echo "args<<EOF_BUILD_ARGS"
              echo "EOF_BUILD_ARGS"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate VARS/SECRETS JSON early so the user sees a clear error rather
          # than a cryptic jq failure mid-substitution.
          echo "$VARS_JSON" | jq -e 'type == "object"' >/dev/null \
            || { echo "::error::VARS_JSON is not a JSON object: $VARS_JSON"; exit 1; }
          echo "$SECRETS_JSON" | jq -e 'type == "object"' >/dev/null \
            || { echo "::error::build_secrets_json input is not a JSON object: $SECRETS_JSON"; exit 1; }

          # Walk each build-arg key/value pair; substitute placeholders.
          #
          # Supported placeholders: ${vars.NAME} and ${secrets.NAME} where NAME
          # matches [A-Z_][A-Z0-9_]*. Anything that does not match (e.g. a
          # literal `${HOME}` with no dot, or a Dockerfile-style `$IMAGE_TAG`)
          # is passed through unchanged.
          #
          # Substitution uses a Python helper rather than bash parameter
          # expansion / sed because the values may contain '/', '&', and other
          # regex metacharacters; Python's str.replace is byte-literal safe
          # and the JSON parsing is simpler than juggling quoted jq output.
          declare -a out_lines=()
          # Export JSON blobs so the helper can read them from env (avoids
          # passing potentially-secret values on argv).
          export VARS_JSON SECRETS_JSON

          # `keys_unsorted` preserves declaration order for stable build cache.
          mapfile -t arg_keys < <(echo "$BUILD_ARGS_JSON" | jq -r 'keys_unsorted[]')
          for k in "${arg_keys[@]}"; do
            # Pull the raw value as a JSON string so we don't lose embedded
            # newlines or quote characters; then decode it once via jq -r.
            v=$(echo "$BUILD_ARGS_JSON" | jq -r --arg n "$k" '.[$n]')

            resolved=$(BUILD_ARG_KEY="$k" BUILD_ARG_VAL="$v" python3 - <<'PY'
          import json, os, re, sys

          key = os.environ["BUILD_ARG_KEY"]
          val = os.environ["BUILD_ARG_VAL"]
          vars_json = json.loads(os.environ.get("VARS_JSON", "{}") or "{}")
          secrets_json = json.loads(os.environ.get("SECRETS_JSON", "{}") or "{}")

          # Match ${vars.NAME} / ${secrets.NAME} — NAME is uppercase + underscores.
          PLACEHOLDER = re.compile(r"\$\{(vars|secrets)\.([A-Z_][A-Z0-9_]*)\}")
          # Catch malformed placeholders for explicit error (e.g. ${vars.lowercase},
          # ${var.X} typo). Anything else `${...}` without a dot is left alone.
          ANY_DOTTED = re.compile(r"\$\{[A-Za-z_][A-Za-z0-9_]*\.[^}]*\}")

          substituted_any = False
          secret_subs = []

          def repl(match):
              global substituted_any
              kind, name = match.group(1), match.group(2)
              src = vars_json if kind == "vars" else secrets_json
              if name not in src:
                  if kind == "vars":
                      sys.stderr.write(
                          f"::error::build_arg '{key}' references ${{vars.{name}}} but "
                          f"no GitHub Actions Variable named '{name}' is defined for "
                          f"this repo/org. Define it under Settings > Secrets and "
                          f"variables > Actions > Variables, or remove the reference.\n"
                      )
                  else:
                      sys.stderr.write(
                          f"::error::build_arg '{key}' references ${{secrets.{name}}} "
                          f"but the caller workflow did not pass it via "
                          f"build_secrets_json. Add `build_secrets_json: "
                          f"${{{{ toJson(secrets) }}}}` (or a curated subset) to the "
                          f"caller's `with:` block, then ensure '{name}' is defined as "
                          f"a repo/org secret.\n"
                      )
                  sys.exit(1)
              substituted_any = True
              if kind == "secrets":
                  secret_subs.append(name)
              return str(src[name])

          resolved = PLACEHOLDER.sub(repl, val)

          # Any dotted ${name.X} still present after valid subs is a typo or
          # unsupported namespace — fail loudly rather than silently shipping it.
          leftover = ANY_DOTTED.search(resolved)
          if leftover:
              sys.stderr.write(
                  f"::error::build_arg '{key}' value contains an unrecognized "
                  f"placeholder '{leftover.group(0)}'. Supported: ${{vars.NAME}} and "
                  f"${{secrets.NAME}} where NAME is uppercase + underscores.\n"
              )
              sys.exit(1)

          # Loud warning per secret substitution — baking a secret into an
          # image leaks it to anyone who can pull.
          for name in secret_subs:
              sys.stderr.write(
                  f"::warning::build_arg '{key}' had ${{secrets.{name}}} substituted "
                  f"into it. The built image will contain this secret in its layers — "
                  f"anyone who can pull the image can extract it. Confirm this is "
                  f"intentional (e.g. private package registry token consumed at "
                  f"build time and not retained); otherwise switch to BuildKit "
                  f"`--mount=type=secret` or runtime env vars.\n"
              )

          # Status line to workflow log on stderr; resolved value on stdout.
          status = "substituted" if substituted_any else "literal"
          sys.stderr.write(f"build_arg {key}: {status}\n")
          sys.stdout.write(resolved)
          PY
            )
            out_lines+=("${k}=${resolved}")
          done

          # Emit as multiline output. Use a randomized heredoc delimiter to avoid
          # any chance of collision with a substituted value containing 'EOF'.
          DELIM="EOF_BUILDARGS_$(openssl rand -hex 8)"
          {
            echo "args<<${DELIM}"
            for line in "${out_lines[@]}"; do
              echo "$line"
            done
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          build-args: ${{ steps.buildargs.outputs.args }}
          tags: |
            ${{ matrix.image.name }}:v${{ needs.gates.outputs.version }}
            ${{ matrix.image.name }}:latest
            ${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          platforms: linux/amd64

  deploy:
    needs: [read-docker-config, build-and-push]
    runs-on: [self-hosted, nexus-deploy]
    outputs:
      deploy_status: ${{ steps.healthcheck.outputs.status }}
      rolled_back: ${{ steps.rollback.outputs.rolled_back }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Auth NEXUS docker daemon to GHCR for the duration of this deploy.
          # GITHUB_TOKEN inherits the workflow's `permissions: packages: write`
          # so the runner can pull private packages owned by the same account.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Sync nexus_path to tagged commit
        shell: bash
        env:
          NEXUS_PATH: ${{ needs.read-docker-config.outputs.nexus_path }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ ! -d "${NEXUS_PATH}/.git" ]; then
            echo "::error::${NEXUS_PATH} is not a git working tree — cannot sync"
            exit 1
          fi
          cd "${NEXUS_PATH}"
          git fetch --tags origin
          git checkout "${TAG}"
          echo "synced ${NEXUS_PATH} to ${TAG} ($(git rev-parse --short HEAD))"

      - name: Record current image digests for rollback
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ needs.read-docker-config.outputs.nexus_path }}"
          services_json='${{ needs.read-docker-config.outputs.services }}'
          declare -A current_images
          rollback_pairs=""
          for svc in $(echo "$services_json" | jq -r '.[]'); do
            cid=$(docker compose -f "${{ needs.read-docker-config.outputs.compose_file }}" ps -q "$svc" 2>/dev/null | head -1 || true)
            if [ -n "$cid" ]; then
              img=$(docker inspect --format '{{.Config.Image}}' "$cid" 2>/dev/null || echo "")
              if [ -n "$img" ]; then
                rollback_pairs+="${svc}=${img}"$'\n'
                echo "snapshot: $svc -> $img"
              fi
            fi
          done
          # Persist rollback map for the rollback step.
          echo "$rollback_pairs" > /tmp/rollback-${{ github.run_id }}.txt

      - name: Deploy new image
        id: deploy
        shell: bash
        env:
          IMAGE_TAG: v${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          cd "${{ needs.read-docker-config.outputs.nexus_path }}"
          services_json='${{ needs.read-docker-config.outputs.services }}'
          # docker compose pull respects IMAGE_TAG via the compose file's
          # `image: ...:${IMAGE_TAG:-latest}` template.
          for svc in $(echo "$services_json" | jq -r '.[]'); do
            docker compose -f "${{ needs.read-docker-config.outputs.compose_file }}" pull "$svc"
          done
          for svc in $(echo "$services_json" | jq -r '.[]'); do
            docker compose -f "${{ needs.read-docker-config.outputs.compose_file }}" up -d --force-recreate "$svc"
          done

      - name: Health check
        id: healthcheck
        shell: bash
        run: |
          set -euo pipefail
          CMD_B64='${{ needs.read-docker-config.outputs.health_check_command }}'
          if [ -z "$CMD_B64" ]; then
            echo "no health_check.command in release-config — skipping (set rollback_on_health_fail: false to silence)"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CMD=$(printf '%s' "$CMD_B64" | base64 -d)
          TIMEOUT=${{ needs.read-docker-config.outputs.health_check_timeout }}
          INTERVAL=${{ needs.read-docker-config.outputs.health_check_interval }}
          deadline=$((SECONDS + TIMEOUT))
          while [ $SECONDS -lt $deadline ]; do
            if bash -c "$CMD" >/dev/null 2>&1; then
              echo "✓ health check passed"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "  health check not ready, retrying in ${INTERVAL}s..."
            sleep "$INTERVAL"
          done
          echo "::error::Health check failed after ${TIMEOUT}s"
          echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback on health failure
        id: rollback
        if: failure() && needs.read-docker-config.outputs.rollback_on_health_fail == 'true'
        shell: bash
        env:
          NEW_VERSION: v${{ needs.build-and-push.outputs.version }}
        run: |
          set -euo pipefail
          echo "::warning::Rolling back to previous image tags"
          cd "${{ needs.read-docker-config.outputs.nexus_path }}"
          if [ ! -f /tmp/rollback-${{ github.run_id }}.txt ]; then
            echo "::error::No rollback snapshot found — cannot roll back"
            echo "rolled_back=failed-no-snapshot" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          rolled_any=false
          while IFS='=' read -r svc img; do
            [ -z "$svc" ] || [ -z "$img" ] && continue
            # Image format: `<registry>/<repo>:<tag>` or `<repo>:<tag>` or just `<id>`.
            # Skip rollback if the snapshot tag isn't a meaningful previous version:
            #   - tag is `latest` (would re-pull the new release that was just published)
            #   - tag matches NEW_VERSION (we'd just redeploy what failed)
            #   - no `:` in img (locally-built untagged image, can't be re-pulled)
            if [[ "$img" != *:* ]]; then
              echo "::warning::skip rollback for $svc — snapshot image '$img' has no tag, can't pull"
              continue
            fi
            tag="${img##*:}"
            if [ "$tag" = "latest" ] || [ "$tag" = "$NEW_VERSION" ]; then
              echo "::warning::skip rollback for $svc — snapshot tag '$tag' is not a meaningful previous version (would redeploy or repull current). Manual intervention required."
              continue
            fi
            echo "rolling $svc back to $img (IMAGE_TAG=$tag)"
            IMAGE_TAG="$tag" docker compose -f "${{ needs.read-docker-config.outputs.compose_file }}" up -d --force-recreate "$svc"
            rolled_any=true
          done < /tmp/rollback-${{ github.run_id }}.txt
          if [ "$rolled_any" = "true" ]; then
            echo "rolled_back=true" >> "$GITHUB_OUTPUT"
          else
            echo "rolled_back=skipped-no-meaningful-target" >> "$GITHUB_OUTPUT"
            echo "::error::Deploy failed and no meaningful rollback target available. Containers are in their post-deploy state — manual intervention required."
          fi

      - name: Cleanup snapshot
        if: always()
        shell: bash
        run: rm -f /tmp/rollback-${{ github.run_id }}.txt || true

  notify:
    needs: [read-docker-config, build-and-push, deploy]
    if: always()
    runs-on: [self-hosted, nexus-deploy]
    steps:
      - name: Publish ntfy
        shell: bash
        run: |
          set -euo pipefail
          PROJECT='${{ needs.read-docker-config.outputs.project }}'
          VERSION='v${{ needs.build-and-push.outputs.version }}'
          DEPLOY_STATUS='${{ needs.deploy.outputs.deploy_status }}'
          ROLLED_BACK='${{ needs.deploy.outputs.rolled_back }}'
          DEPLOY_RESULT='${{ needs.deploy.result }}'

          if [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="✅ ${PROJECT} ${VERSION} deployed"
            BODY="Released and healthy on NEXUS."
            PRIO="default"
            TAGS="rocket,${PROJECT}"
          elif [ "$ROLLED_BACK" = "true" ]; then
            TITLE="⚠️ ${PROJECT} ${VERSION} rolled back"
            BODY="Health check failed; reverted to previous image."
            PRIO="high"
            TAGS="warning,${PROJECT}"
          else
            TITLE="❌ ${PROJECT} ${VERSION} deploy FAILED"
            BODY="Deploy job failed; manual intervention required. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            PRIO="urgent"
            TAGS="rotating_light,${PROJECT}"
          fi

          curl -fsS -X POST \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIO}" \
            -H "Tags: ${TAGS}" \
            -d "${BODY}" \
            "${{ inputs.ntfy_host }}/${{ inputs.ntfy_topic }}" >/dev/null
          echo "ntfy: ${TITLE}"
