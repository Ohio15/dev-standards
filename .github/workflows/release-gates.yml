name: release-gates

# Reusable composite gate workflow. Called as a prereq from each surface
# release workflow (electron-release, docker-release, mcp-release, lib-release).
# Reads the consumer's release-config.yml to decide which gates run.
# Any failure aborts the release.

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        default: ubuntu-latest
        description: Runner label for gate jobs.
      node_version:
        type: string
        default: '20'
        description: Node version for tests + npm-audit.
    outputs:
      version:
        description: Version asserted to match the pushed tag.
        value: ${{ jobs.tag-matches-version.outputs.version }}

permissions:
  contents: read

jobs:
  read-config:
    runs-on: ${{ inputs.runs_on }}
    outputs:
      project: ${{ steps.parse.outputs.project }}
      surface: ${{ steps.parse.outputs.surface }}
      tests_enabled: ${{ steps.parse.outputs.tests_enabled }}
      test_command: ${{ steps.parse.outputs.test_command }}
      gitleaks_enabled: ${{ steps.parse.outputs.gitleaks_enabled }}
      size_guard_enabled: ${{ steps.parse.outputs.size_guard_enabled }}
      npm_audit_severity: ${{ steps.parse.outputs.npm_audit_severity }}
      conventional_commits_enabled: ${{ steps.parse.outputs.conventional_commits_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse release-config.yml
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f release-config.yml ]; then
            echo "::error::release-config.yml not found at repo root."
            exit 1
          fi
          # yq is preinstalled on ubuntu-latest runners.
          # Read each value, default to a literal default when the key is null
          # (yq's `// default` returns the literal "null" string for missing
          # keys, not the default — we handle that explicitly here so a key
          # set to `false` doesn't get coerced to the default `true`).
          read_with_default() {
            local path="$1" default="$2" val
            val=$(yq "$path" release-config.yml)
            if [ "$val" = "null" ] || [ -z "$val" ]; then
              echo "$default"
            else
              echo "$val"
            fi
          }
          project=$(read_with_default '.project' 'unknown')
          surface=$(read_with_default '.surface' '')
          tests_enabled=$(read_with_default '.gates.tests' 'true')
          test_command=$(read_with_default '.gates.test_command' 'npm test')
          gitleaks_enabled=$(read_with_default '.gates.gitleaks' 'true')
          size_guard_enabled=$(read_with_default '.gates.size_guard' 'true')
          npm_audit_severity=$(read_with_default '.gates.npm_audit' 'high')
          conventional_commits_enabled=$(read_with_default '.gates.conventional_commits' 'false')

          if [ -z "$surface" ]; then
            echo "::error::release-config.yml missing required field: surface"
            exit 1
          fi

          {
            echo "project=$project"
            echo "surface=$surface"
            echo "tests_enabled=$tests_enabled"
            echo "test_command=$test_command"
            echo "gitleaks_enabled=$gitleaks_enabled"
            echo "size_guard_enabled=$size_guard_enabled"
            echo "npm_audit_severity=$npm_audit_severity"
            echo "conventional_commits_enabled=$conventional_commits_enabled"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## release-gates configuration"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| project | ${{ steps.parse.outputs.project }} |"
            echo "| surface | ${{ steps.parse.outputs.surface }} |"
            echo "| tests | ${{ steps.parse.outputs.tests_enabled }} (\`${{ steps.parse.outputs.test_command }}\`) |"
            echo "| gitleaks | ${{ steps.parse.outputs.gitleaks_enabled }} |"
            echo "| size_guard | ${{ steps.parse.outputs.size_guard_enabled }} |"
            echo "| npm_audit | ${{ steps.parse.outputs.npm_audit_severity }} |"
            echo "| conventional_commits | ${{ steps.parse.outputs.conventional_commits_enabled }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    needs: read-config
    if: needs.read-config.outputs.tests_enabled == 'true'
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci
      - name: Run tests
        run: ${{ needs.read-config.outputs.test_command }}

  gitleaks:
    needs: read-config
    if: needs.read-config.outputs.gitleaks_enabled == 'true'
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GL_VERSION=8.18.4
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan tagged commit
        shell: bash
        run: |
          set -euo pipefail
          # Scan from the start of the new commits introduced since the previous tag.
          # If no previous tag exists, scan full history (initial release).
          if PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
            echo "scanning ${PREV_TAG}..HEAD"
            gitleaks detect --no-banner --redact --log-opts="${PREV_TAG}..HEAD"
          else
            echo "no previous tag — scanning full history"
            gitleaks detect --no-banner --redact
          fi

  size-guard:
    needs: read-config
    if: needs.read-config.outputs.size_guard_enabled == 'true'
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Reject tracked files larger than 10 MB
        shell: bash
        run: |
          set -euo pipefail
          MAX=$((10 * 1024 * 1024))
          violations=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            allow=0
            if [ -f ".large-files-allowlist" ]; then
              while IFS= read -r pat; do
                [[ "$pat" =~ ^[[:space:]]*# || -z "$pat" ]] && continue
                if [[ "$f" == $pat || "$f" == ${pat%/}/* ]]; then allow=1; break; fi
              done <".large-files-allowlist"
            fi
            [ "$allow" -eq 1 ] && continue
            size=$(wc -c <"$f" 2>/dev/null || echo 0)
            if [ "$size" -gt "$MAX" ]; then
              violations+=$'\n'"  $f ($((size / 1024 / 1024)) MB)"
            fi
          done < <(git ls-files)
          if [ -n "$violations" ]; then
            echo "::error::Tracked files exceed 10 MB:$violations"
            exit 1
          fi

  npm-audit:
    needs: read-config
    if: needs.read-config.outputs.npm_audit_severity != 'off'
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Run npm audit
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "no package.json — skipping (set gates.npm_audit: off in release-config.yml to silence)"
            exit 0
          fi
          npm audit --audit-level=${{ needs.read-config.outputs.npm_audit_severity }}

  tag-matches-version:
    needs: read-config
    runs-on: ${{ inputs.runs_on }}
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Assert tag matches package version
        id: check
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$TAG_VERSION" = "$GITHUB_REF" ]; then
            echo "::error::Workflow not triggered by a v* tag (GITHUB_REF=$GITHUB_REF)"
            exit 1
          fi

          # Source of truth precedence: package.json -> pyproject.toml ->
          # release-config.yml:version.
          if [ -f package.json ]; then
            PKG_VERSION=$(jq -r .version package.json)
            SOURCE=package.json
          elif [ -f pyproject.toml ]; then
            PKG_VERSION=$(yq '.project.version // .tool.poetry.version' -p toml pyproject.toml)
            SOURCE=pyproject.toml
          else
            PKG_VERSION=$(yq '.version // ""' release-config.yml)
            SOURCE=release-config.yml
          fi

          if [ -z "$PKG_VERSION" ] || [ "$PKG_VERSION" = "null" ]; then
            echo "::error::No version found in $SOURCE"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match $SOURCE version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "✓ tag v$TAG_VERSION matches $SOURCE version $PKG_VERSION" >> "$GITHUB_STEP_SUMMARY"

  conventional-commits-lint:
    needs: read-config
    if: needs.read-config.outputs.conventional_commits_enabled == 'true'
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commits since previous tag
        shell: bash
        run: |
          set -euo pipefail
          if PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null); then
            range="${PREV_TAG}..HEAD"
          else
            range="HEAD"
          fi
          fail=0
          # Conventional Commits header: type(scope?)!?: subject
          re='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+'
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Skip merge commits.
            case "$msg" in
              "Merge "*) continue ;;
            esac
            if ! [[ "$msg" =~ $re ]]; then
              echo "::error::Non-conventional commit: $msg"
              fail=1
            fi
          done < <(git log "$range" --no-merges --pretty=format:"%s")
          [ "$fail" -eq 0 ] || exit 1

  # IMPL-5 — version-uniqueness gate.
  # Structural rule (no input toggle). Motivating scar: APM v0.9.2 had two
  # version.json files (root=0.9.2, server/=0.9.1). Gate-green + runtime-wrong.
  # This gate makes that state impossible by construction.
  version-uniqueness:
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Assert all version.json files agree
        shell: bash
        run: |
          set -euo pipefail
          # Find every version.json, excluding common build/vendor/VCS dirs.
          mapfile -t files < <(find . -type f -name version.json \
            -not -path './node_modules/*' \
            -not -path '*/node_modules/*' \
            -not -path './vendor/*' \
            -not -path '*/vendor/*' \
            -not -path './.git/*' \
            -not -path './dist/*' \
            -not -path '*/dist/*' \
            -not -path './build/*' \
            -not -path '*/build/*' \
            -not -path './target/*' \
            -not -path '*/target/*')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "no version.json files found — nothing to compare"
            exit 0
          fi

          if [ "${#files[@]}" -eq 1 ]; then
            v=$(jq -r .version "${files[0]}")
            echo "single version.json: ${files[0]} = $v"
            exit 0
          fi

          # Multiple files — extract every value and compare.
          declare -a pairs
          first=""
          divergent=0
          for f in "${files[@]}"; do
            v=$(jq -r .version "$f")
            pairs+=("  $f : $v")
            if [ -z "$first" ]; then
              first="$v"
            elif [ "$v" != "$first" ]; then
              divergent=1
            fi
          done

          if [ "$divergent" -eq 1 ]; then
            echo "::error::version.json drift detected"
            for p in "${pairs[@]}"; do
              echo "$p"
            done
            exit 1
          fi

          {
            echo "## version-uniqueness"
            echo ""
            echo "All ${#files[@]} version.json files agree on \`$first\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # IMPL-7 — Go vulnerability gate (warn-mode soak ends 2026-05-15).
  # To flip to blocking after the soak: remove `continue-on-error: true` below
  # and delete this comment block.
  # Motivating scar: APM had 1 critical (pgx memory-safety) + 7 high Go-side
  # CVEs invisible to the npm-only `npm_audit` gate.
  govulncheck:
    runs-on: ${{ inputs.runs_on }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Detect Go modules
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t mods < <(find . -type f -name go.mod \
            -not -path './vendor/*' \
            -not -path '*/vendor/*' \
            -not -path './.git/*')
          if [ "${#mods[@]}" -eq 0 ]; then
            echo "no go.mod found — skipping govulncheck"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${mods[@]}" > /tmp/go-mods.txt
          echo "Go modules detected:"
          cat /tmp/go-mods.txt

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.found == 'true'
        with:
          go-version: 'stable'

      - name: Install govulncheck
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run govulncheck on every module
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r mod; do
            dir=$(dirname "$mod")
            echo "::group::govulncheck $dir"
            if ! ( cd "$dir" && govulncheck ./... ); then
              fail=1
            fi
            echo "::endgroup::"
          done < /tmp/go-mods.txt
          if [ "$fail" -ne 0 ]; then
            echo "::error::govulncheck found call-graph-reachable vulnerabilities"
            exit 1
          fi

  # IMPL-7 — Python vulnerability gate (warn-mode soak ends 2026-05-15).
  # To flip to blocking after the soak: remove `continue-on-error: true` below
  # and delete this comment block.
  # Motivating scar: same as govulncheck — Python deps invisible to npm_audit.
  pip_audit:
    runs-on: ${{ inputs.runs_on }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python dependency manifests
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/py-manifests.txt
          # requirements*.txt anywhere
          find . -type f \( -name 'requirements.txt' -o -name 'requirements-*.txt' -o -name 'requirements_*.txt' \) \
            -not -path './node_modules/*' -not -path '*/node_modules/*' \
            -not -path './vendor/*' -not -path '*/vendor/*' \
            -not -path './.git/*' \
            -not -path './dist/*' -not -path '*/dist/*' \
            -not -path './build/*' -not -path '*/build/*' \
            >> /tmp/py-manifests.txt || true
          # Pipfile / pyproject.toml / poetry.lock
          find . -type f \( -name 'Pipfile' -o -name 'pyproject.toml' -o -name 'poetry.lock' \) \
            -not -path './node_modules/*' -not -path '*/node_modules/*' \
            -not -path './vendor/*' -not -path '*/vendor/*' \
            -not -path './.git/*' \
            -not -path './dist/*' -not -path '*/dist/*' \
            -not -path './build/*' -not -path '*/build/*' \
            >> /tmp/py-manifests.txt || true

          if [ ! -s /tmp/py-manifests.txt ]; then
            echo "no Python dependency manifests found — skipping pip-audit"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Python manifests detected:"
          cat /tmp/py-manifests.txt

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.found == 'true'
        with:
          python-version: '3.x'

      - name: Install pip-audit
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip-audit on every manifest
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          # Deduplicate: pyproject.toml + poetry.lock at the same dir audit once.
          # We resolve each manifest to its dir and the manifest type, then audit.
          declare -A seen_dirs
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            base=$(basename "$manifest")
            dir=$(dirname "$manifest")
            case "$base" in
              requirements*.txt)
                echo "::group::pip-audit -r $manifest"
                if ! pip-audit --strict --vulnerability-service osv -r "$manifest"; then
                  fail=1
                fi
                echo "::endgroup::"
                ;;
              Pipfile|pyproject.toml|poetry.lock)
                key="$dir"
                if [ -n "${seen_dirs[$key]:-}" ]; then continue; fi
                seen_dirs[$key]=1
                echo "::group::pip-audit project $dir"
                if ! ( cd "$dir" && pip-audit --strict --vulnerability-service osv ); then
                  fail=1
                fi
                echo "::endgroup::"
                ;;
            esac
          done < /tmp/py-manifests.txt

          # pip-audit's severity model is per-vuln; --strict ensures non-zero
          # exit on any finding. We treat any high+critical as a fail; pip-audit
          # itself reports all findings — we filter at the gate level by parsing
          # if needed. For the warn-mode soak we surface every finding.
          if [ "$fail" -ne 0 ]; then
            echo "::error::pip-audit found vulnerabilities (high/critical block in non-warn mode)"
            exit 1
          fi

  # IMPL-7 — Rust vulnerability gate (warn-mode soak ends 2026-05-15).
  # To flip to blocking after the soak: remove `continue-on-error: true` below
  # and delete this comment block.
  # Motivating scar: same blind-spot pattern as Go/Python — Cargo deps invisible
  # to the npm-only audit.
  cargo_audit:
    runs-on: ${{ inputs.runs_on }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Detect Cargo manifests
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t cargos < <(find . -type f -name Cargo.toml \
            -not -path './node_modules/*' -not -path '*/node_modules/*' \
            -not -path './vendor/*' -not -path '*/vendor/*' \
            -not -path './.git/*' \
            -not -path './target/*' -not -path '*/target/*' \
            -not -path './dist/*' -not -path '*/dist/*' \
            -not -path './build/*' -not -path '*/build/*')
          if [ "${#cargos[@]}" -eq 0 ]; then
            echo "no Cargo.toml found — skipping cargo-audit"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${cargos[@]}" > /tmp/cargo-manifests.txt
          echo "Cargo manifests detected:"
          cat /tmp/cargo-manifests.txt

      - name: Install cargo-audit
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # cargo-audit ships as a static binary via rustsec releases.
          CA_VERSION=0.21.1
          curl -fsSL "https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${CA_VERSION}/cargo-audit-x86_64-unknown-linux-musl-v${CA_VERSION}.tgz" \
            | tar -xz -C /tmp
          install -m 0755 "/tmp/cargo-audit-x86_64-unknown-linux-musl-v${CA_VERSION}/cargo-audit" /usr/local/bin/cargo-audit
          cargo-audit --version

      - name: Run cargo-audit on every manifest
        if: steps.detect.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          # cargo-audit operates on the lockfile next to each Cargo.toml.
          # Workspace members share their workspace's Cargo.lock, so we
          # deduplicate by the directory containing Cargo.lock.
          declare -A seen_locks
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            dir=$(dirname "$manifest")
            # Walk up to find the nearest Cargo.lock (workspace members share
            # the workspace root's lockfile).
            lockdir="$dir"
            while [ "$lockdir" != "." ] && [ "$lockdir" != "/" ] && [ ! -f "$lockdir/Cargo.lock" ]; do
              lockdir=$(dirname "$lockdir")
            done
            if [ ! -f "$lockdir/Cargo.lock" ]; then
              echo "::warning::no Cargo.lock found alongside or above $manifest — skipping (a releasable Rust crate must commit Cargo.lock)"
              continue
            fi
            key="$lockdir"
            if [ -n "${seen_locks[$key]:-}" ]; then continue; fi
            seen_locks[$key]=1
            echo "::group::cargo-audit $lockdir/Cargo.lock"
            if ! cargo-audit audit --file "$lockdir/Cargo.lock"; then
              fail=1
            fi
            echo "::endgroup::"
          done < /tmp/cargo-manifests.txt
          if [ "$fail" -ne 0 ]; then
            echo "::error::cargo-audit found advisories"
            exit 1
          fi
